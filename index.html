<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chris' Orbiter</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050a15">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/space-shuttle.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/space-shuttle.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #050a15; }
        body { 
            margin: 0; background: #000; color: #94a3b8; overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; font-family: sans-serif; 
            padding-top: env(safe-area-inset-top);
        }

        /* 1. MOVING COSMIC BACKGROUND */
        .cosmic-field { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at bottom, #0a1122 0%, #050a15 100%);
        }
        .star { 
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: twinkle var(--twinkle-dur) infinite ease-in-out, orbit var(--orbit-dur) infinite linear;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes orbit { from { transform: rotate(0deg) translateX(50px) rotate(0deg); } to { transform: rotate(360deg) translateX(50px) rotate(-360deg); } }

        /* 2. OCASIONAL SLEEK SHIPS */
        .ship {
            position: absolute; z-index: -1; opacity: 0;
            width: 30px; height: 30px;
            background: url('https://img.icons8.com/fluency/48/fighter-jet.png') no-repeat center;
            background-size: contain;
            animation: glide var(--glide-dur) infinite linear;
            filter: drop-shadow(0 0 5px rgba(56, 189, 248, 0.4));
        }
        @keyframes glide {
            0% { left: -50px; top: var(--glide-top); opacity: 0; transform: rotate(var(--glide-rot)) scale(0.2); }
            10% { opacity: 1; transform: rotate(var(--glide-rot)) scale(0.6); }
            90% { opacity: 1; transform: rotate(var(--glide-rot)) scale(0.6); }
            100% { left: 105%; top: var(--glide-top-end); opacity: 0; transform: rotate(var(--glide-rot)) scale(0.2); }
        }

        .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-zen { background: rgba(56, 189, 248, 0.3) !important; border-color: var(--accent) !important; color: white !important; box-shadow: 0 0 25px rgba(56, 189, 248, 0.5); }
        .btn-active { background: var(--accent) !important; color: white !important; opacity: 1 !important; pointer-events: auto !important; box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); }
        #focus-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: #000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen p-6 font-sans pb-32" onclick="primeAudioEngine()">
    <div id="cosmic-layer" class="cosmic-field"></div>
    <div id="ship-layer" class="cosmic-field"></div>

    <div id="main-ui" class="max-w-md mx-auto">
        <header class="mt-8 mb-10 flex justify-between items-end">
            <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase">Chris' Orbiter</h1>
            <div class="w-2 h-2 bg-sky-500 rounded-full animate-pulse shadow-[0_0_12px_#38bdf8]"></div>
        </header>

        <section class="glass rounded-3xl p-6 mb-6 border-t border-white/10">
            <h2 class="text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-2">Command Brief</h2>
            <p id="daily-inspiration" class="text-sm text-slate-200 leading-relaxed italic"></p>
        </section>

        <section class="glass rounded-3xl p-6 mb-6">
            <h2 class="text-[9px] font-bold text-sky-500 uppercase tracking-widest mb-3">Log Yesterday's Win</h2>
            <input type="text" id="reflection-input" oninput="checkInput()" placeholder="Awaiting entry..." 
                class="w-full bg-transparent border-b border-white/10 py-2 text-lg text-white focus:outline-none focus:border-sky-500">
        </section>

        <div class="grid grid-cols-2 gap-3 mb-10">
            <button onclick="playZen('ocean')" id="btn-ocean" class="py-4 glass rounded-2xl text-[10px] uppercase font-bold tracking-widest">Ocean</button>
            <button onclick="playZen('storm')" id="btn-storm" class="py-4 glass rounded-2xl text-[10px] uppercase font-bold tracking-widest">Storm</button>
            <button onclick="playZen('rain')" id="btn-rain" class="py-4 glass rounded-2xl text-[10px] uppercase font-bold tracking-widest">Rain</button>
            <button onclick="playZen('lofi')" id="btn-lofi" class="py-4 glass rounded-2xl text-[10px] uppercase font-bold tracking-widest">Lofi</button>
        </div>
    </div>

    <div id="focus-overlay">
        <div class="text-[11px] tracking-[1em] text-sky-500 font-bold mb-8 uppercase">Orbiter: Engaged</div>
        <div id="timer" class="text-8xl font-thin text-white mb-20">60:00</div>
        <button onclick="stopFocus()" class="py-4 px-10 glass rounded-full text-[10px] uppercase tracking-[0.4em]">Return to Deck</button>
    </div>

    <footer id="footer-ui" class="fixed bottom-0 left-0 right-0 p-8">
        <button id="lock-btn" onclick="startFocus()" class="w-full py-6 rounded-3xl font-black tracking-[0.4em] text-[12px] uppercase opacity-10 pointer-events-none bg-slate-800 transition-all">
            Start Orbiter
        </button>
    </footer>

    <audio id="audio-ocean" loop src="https://www.soundjay.com/nature/ocean-waves-1.mp3"></audio>
    <audio id="audio-storm" loop src="https://www.soundjay.com/nature/thunderstorm-01.mp3"></audio>
    <audio id="audio-rain" loop src="https://www.soundjay.com/nature/rain-01.mp3"></audio>
    <audio id="audio-lofi" loop src="https://assets.mixkit.co/music/preview/mixkit-night-city-744.mp3"></audio>

    <script>
        // Generating stars
        const starLayer = document.getElementById('cosmic-layer');
        for (let i = 0; i < 70; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 2 + 0.5) + 'px';
            star.style.top = Math.random() * 100 + '%'; star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--twinkle-dur', (Math.random() * 3 + 2) + 's');
            star.style.setProperty('--orbit-dur', (Math.random() * 300 + 100) + 's');
            starLayer.appendChild(star);
        }

        // Generating Ships
        const shipLayer = document.getElementById('ship-layer');
        for (let i = 0; i < 3; i++) {
            const ship = document.createElement('div');
            ship.className = 'ship';
            ship.style.setProperty('--glide-dur', (Math.random() * 15 + 15) + 's');
            ship.style.setProperty('--glide-top', (Math.random() * 80 + 10) + '%');
            ship.style.setProperty('--glide-top-end', (Math.random() * 80 + 10) + '%');
            ship.style.setProperty('--glide-rot', (Math.random() * 20 + 80) + 'deg');
            ship.style.animationDelay = (i * 10) + 's';
            shipLayer.appendChild(ship);
        }

        // Real Quotes
        const realQuotes = [
            "Very little is needed to make a happy life; it is all within yourself, in your way of thinking. — Marcus Aurelius",
            "Luck is what happens when preparation meets opportunity. — Seneca",
            "You do not rise to the level of your goals. You fall to the level of your systems. — James Clear",
            "The impediment to action advances action. What stands in the way becomes the way. — Marcus Aurelius",
            "He who has a why to live for can bear almost any how. — Friedrich Nietzsche"
        ];
        document.getElementById('daily-inspiration').innerText = realQuotes[Math.floor(Math.random() * realQuotes.length)];

        // PIXEL 8 AUDIO FIX: Unlocking on first interaction
        let audioEnginePrimed = false;
        function primeAudioEngine() {
            if (audioEnginePrimed) return;
            document.querySelectorAll('audio').forEach(a => { a.play().then(() => a.pause()).catch(() => {}); });
            audioEnginePrimed = true;
            console.log("Audio Engine Primed on Pixel.");
        }

        function checkInput() {
            const val = document.getElementById('reflection-input').value.trim();
            const btn = document.getElementById('lock-btn');
            btn.classList.toggle('btn-active', val.length > 0);
        }

        let currentAudio = null;
        function playZen(type) {
            primeAudioEngine(); // Double-prime just in case
            const target = document.getElementById(`audio-${type}`);
            const btn = document.getElementById(`btn-${type}`);

            if (currentAudio === target) {
                target.pause();
                currentAudio = null;
                btn.classList.remove('active-zen');
            } else {
                if (currentAudio) {
                    currentAudio.pause();
                    document.querySelectorAll('.active-zen').forEach(b => b.classList.remove('active-zen'));
                }
                
                target.currentTime = 0;
                // PIXEL 8 PRO REQUIRES User Gesture to Play
                target.play().then(_ => {
                    currentAudio = target;
                    btn.classList.add('active-zen');
                }).catch(e => {
                    console.error("Audio blocked:", e);
                    alert("Ensure Media Volume is up and Try Tapping the Button Again!");
                });
            }
        }

        let timerInterval = null;
        function startFocus() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('footer-ui').style.display = 'none';
            document.getElementById('focus-overlay').style.display = 'flex';
            let timeLeft = 3600;
            timerInterval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                if (--timeLeft < 0) stopFocus();
            }, 1000);
        }

        function stopFocus() {
            clearInterval(timerInterval);
            document.getElementById('focus-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('footer-ui').style.display = 'block';
        }
    </script>
</body>
</html>
