<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Horizon</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency-systems-filled/192/ff5f1f/horizon.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency-systems-filled/192/ff5f1f/horizon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --orange: #ff5f1f; --black: #000000; }
        
        body { 
            font-family: 'Space Grotesk', sans-serif; background: var(--black); color: #ffffff;
            -webkit-tap-highlight-color: transparent; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; user-select: none; margin: 0;
        }

        /* Immersion Space Logic */
        .fade-element { transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s ease; opacity: 1; }
        .is-immersed .fade-element { opacity: 0; transform: translateY(-30px); pointer-events: none; }

        .glass-card {
            background: rgba(255, 95, 31, 0.03); border: 1px solid rgba(255, 95, 31, 0.15);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
        }

        .breath-ring {
            width: 18px; height: 18px; background: var(--orange); border-radius: 50%;
            opacity: 0; transition: transform 4s ease-in-out, opacity 1s ease;
            filter: drop-shadow(0 0 15px var(--orange));
        }

        #horizon-trigger {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .is-immersed #horizon-trigger {
            background: transparent !important; border-color: transparent !important; 
            box-shadow: none !important; transform: translateY(-25vh);
        }

        /* Active State for Button */
        .active-glow { box-shadow: 0 0 40px rgba(255, 95, 31, 0.1); border-color: var(--orange) !important; }
    </style>
</head>
<body class="p-8 pb-12" id="root-body">

    <header class="mt-12 flex flex-col fade-element">
        <h1 class="text-5xl font-bold tracking-tighter uppercase text-white leading-none">Horizon</h1>
        <p id="date-label" class="text-[10px] tracking-[0.6em] text-orange-500 font-bold mt-4 uppercase"></p>
    </header>

    <main class="flex-1 flex flex-col justify-center fade-element">
        <div class="glass-card p-10 rounded-[3.5rem] border-l-4 border-orange-600 shadow-2xl">
            <p id="quote-body" class="text-2xl leading-tight font-light text-white/90 italic"></p>
            <p id="quote-cite" class="mt-8 text-[10px] font-bold uppercase tracking-[0.4em] text-orange-500/40"></p>
        </div>
    </main>

    <footer class="relative z-50">
        <button id="horizon-trigger" 
            class="w-full py-12 glass-card rounded-[3rem] flex flex-col items-center justify-center active:scale-95 transition-transform">
            <div id="breath-node" class="breath-ring mb-4"></div>
            <span id="btn-status" class="text-[9px] font-bold uppercase tracking-[0.7em] text-white/20">System Ready</span>
            <span id="btn-text" class="text-xl font-bold text-white mt-1">Begin Immersion</span>
        </button>
        <p id="system-log" class="text-[7px] text-white/5 mt-6 text-center uppercase tracking-widest">Engine Optimized for Pixel 8 Pro</p>
    </footer>

    <audio id="audio-engine" loop preload="auto">
        <source src="https://www.soundjay.com/nature/ocean-waves-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audio-engine');
        const trigger = document.getElementById('horizon-trigger');
        const body = document.getElementById('root-body');
        const breath = document.getElementById('breath-node');
        const log = document.getElementById('system-log');
        
        let isActive = false;

        // Initialize UI Content
        const d = new Date();
        document.getElementById('date-label').innerText = d.toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric'});

        const quotes = [
            { t: "You have power over your mind—not outside events. Realize this, and you will find strength.", a: "Marcus Aurelius" },
            { t: "Luck is what happens when preparation meets opportunity.", a: "Seneca" },
            { t: "The impediment to action advances action. What stands in the way becomes the way.", a: "Marcus Aurelius" }
        ];
        const q = quotes[Math.floor(Math.random()*quotes.length)];
        document.getElementById('quote-body').innerText = `"${q.t}"`;
        document.getElementById('quote-cite').innerText = `— ${q.a}`;

        // VALIDATED INTERACTION ENGINE
        const toggleSpace = () => {
            // Force Haptic Feedback
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate([25, 10, 25]);
            }

            if (!isActive) {
                // Audio Initiation
                audio.play().then(() => {
                    isActive = true;
                    body.classList.add('is-immersed');
                    trigger.classList.add('active-glow');
                    breath.style.opacity = "1";
                    document.getElementById('btn-text').innerText = "";
                    document.getElementById('btn-status').innerText = "In Orbit";
                    log.innerText = "Immersion Active";
                    runBreath();
                }).catch(err => {
                    log.innerText = "Permission Required: Tap Again";
                    // Attempt muted start as a browser "warm up"
                    audio.muted = true;
                    audio.play().then(() => { 
                        audio.muted = false;
                        isActive = true;
                        body.classList.add('is-immersed');
                    });
                });
            } else {
                audio.pause();
                isActive = false;
                body.classList.remove('is-immersed');
                trigger.classList.remove('active-glow');
                breath.style.opacity = "0";
                document.getElementById('btn-text').innerText = "Begin Immersion";
                document.getElementById('btn-status').innerText = "System Ready";
                log.innerText = "System Paused";
            }
        };

        // Standard Event Binding for maximum mobile compatibility
        trigger.addEventListener('click', toggleSpace);

        function runBreath() {
            if (!isActive) return;
            breath.style.transform = "scale(8)";
            setTimeout(() => {
                if (isActive) {
                    breath.style.transform = "scale(1)";
                    setTimeout(runBreath, 4000);
                }
            }, 4000);
        }
    </script>
</body>
</html>
