<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Horizon</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency-systems-filled/192/ff5f1f/horizon.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency-systems-filled/192/ff5f1f/horizon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        /* FIX 2: Re-enable Pull-to-Refresh if desired, but prevent bounce */
        html, body { 
            overscroll-behavior-y: contain; 
            background: #000; 
            height: 100%; 
            margin: 0; 
            padding: 0;
            user-select: none;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        .fade-element { transition: opacity 1s ease, transform 1s ease; }
        .is-immersed .fade-element { opacity: 0; transform: translateY(-20px); pointer-events: none; }

        .glass-card {
            background: rgba(255, 95, 31, 0.05);
            border: 1px solid rgba(255, 95, 31, 0.2);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        /* FIX 3: Higher Z-Index for Button to ensure it captures Taps */
        #main-trigger {
            z-index: 9999;
            position: relative;
            touch-action: manipulation;
        }

        .breath-ring {
            width: 14px; height: 14px; background: #ff5f1f; border-radius: 50%;
            opacity: 0; transition: transform 4s ease-in-out, opacity 1s;
        }
    </style>
</head>
<body class="p-8" id="app-shell">

    <header class="mt-12 fade-element">
        <h1 class="text-5xl font-bold tracking-tighter uppercase">Horizon</h1>
        <p id="date-label" class="text-[10px] tracking-[0.5em] text-orange-500 font-bold mt-4 uppercase"></p>
    </header>

    <main class="flex-1 flex flex-col justify-center fade-element">
        <div class="glass-card p-10 rounded-[3rem] border-l-4 border-orange-600">
            <p id="quote" class="text-2xl font-light italic text-white/90"></p>
            <p id="author" class="mt-6 text-[10px] uppercase tracking-widest text-orange-500/40"></p>
        </div>
    </main>

    <footer class="mb-10">
        <button id="main-trigger" class="w-full py-12 glass-card rounded-[2.5rem] flex flex-col items-center justify-center">
            <div id="breath" class="breath-ring mb-4"></div>
            <span id="status" class="text-[9px] uppercase tracking-[0.6em] text-white/20">Standby</span>
            <span id="label" class="text-xl font-bold tracking-tight">Begin Immersion</span>
        </button>
    </footer>

    <audio id="audio-engine" loop crossorigin="anonymous">
        <source src="https://www.soundjay.com/nature/ocean-waves-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('main-trigger');
        const audio = document.getElementById('audio-engine');
        const shell = document.getElementById('app-shell');
        const breath = document.getElementById('breath');
        
        let active = false;

        // Date & Quote Setup
        document.getElementById('date-label').innerText = new Date().toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric'});
        document.getElementById('quote').innerText = `"The soul becomes dyed with the color of its thoughts."`;
        document.getElementById('author').innerText = "— Marcus Aurelius";

        // FIX 4: Use 'touchstart' for instant mobile response
        const handleInteraction = (e) => {
            if (e) e.preventDefault();
            
            // Haptic Feedback
            if (navigator.vibrate) navigator.vibrate(40);

            if (!active) {
                // Audio Unlock
                audio.play().then(() => {
                    active = true;
                    shell.classList.add('is-immersed');
                    breath.style.opacity = "1";
                    document.getElementById('label').innerText = "Active";
                    document.getElementById('status').innerText = "In Space";
                    startBreathing();
                }).catch(err => {
                    // Try to force un-mute if browser blocked it
                    audio.muted = true;
                    audio.play().then(() => { 
                        audio.muted = false; 
                        active = true;
                        shell.classList.add('is-immersed');
                    });
                });
            } else {
                audio.pause();
                active = false;
                shell.classList.remove('is-immersed');
                breath.style.opacity = "0";
                document.getElementById('label').innerText = "Begin Immersion";
                document.getElementById('status').innerText = "Standby";
            }
        };

        btn.addEventListener('touchstart', handleInteraction);
        // Fallback for desktop testing
        btn.addEventListener('click', (e) => { if(!active) handleInteraction(e); });

        function startBreathing() {
            if (!active) return;
            breath.style.transform = "scale(8)";
            setTimeout(() => {
                if (active) {
                    breath.style.transform = "scale(1)";
                    setTimeout(startBreathing, 4000);
                }
            }, 4000);
        }
    </script>
</body>
</html>
