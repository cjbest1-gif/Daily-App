<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chris' Orbiter</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/space-shuttle.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #050a15; }
        
        /* Starfield Background */
        body { 
            background: radial-gradient(circle at bottom, #0a1122 0%, #050a15 100%);
            background-attachment: fixed;
            color: #94a3b8;
            padding-top: env(safe-area-inset-top);
            -webkit-tap-highlight-color: transparent;
        }
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            z-index: -1; opacity: 0.4;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .active-zen { 
            background: rgba(56, 189, 248, 0.2) !important; 
            border-color: var(--accent) !important; color: white !important; 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); 
        }

        .btn-active { 
            background: var(--accent) !important; color: white !important; 
            opacity: 1 !important; pointer-events: auto !important; 
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        #focus-overlay { 
            display: none; position: fixed; inset: 0; z-index: 100; 
            background: #000; flex-direction: column; align-items: center; justify-content: center; 
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .float-card { animation: float 6s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen p-6 font-sans pb-32 select-none">
    <div class="stars"></div>

    <div id="main-ui" class="max-w-md mx-auto">
        <header class="mt-8 mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase">Chris' Orbiter</h1>
                <p id="date-display" class="text-[10px] uppercase tracking-[0.5em] text-sky-500/60 font-bold mt-1"></p>
            </div>
            <div class="w-2 h-2 bg-sky-500 rounded-full shadow-[0_0_10px_#38bdf8] animate-pulse"></div>
        </header>

        <section class="glass rounded-3xl p-6 mb-6 float-card border-t border-t-white/10">
            <div class="flex items-center gap-3 mb-3">
                <div class="w-1.5 h-1.5 bg-amber-500 rounded-full"></div>
                <h2 class="text-[10px] font-bold text-white uppercase tracking-widest">Daily Mission Brief</h2>
            </div>
            <p id="daily-inspiration" class="text-sm text-slate-200 leading-relaxed italic">
                "The horizon is only a limit if you stop moving. Today, we bridge the gap between intent and execution."
            </p>
        </section>

        <section class="glass rounded-3xl p-6 mb-6">
            <h2 class="text-[9px] font-bold text-sky-500 uppercase tracking-widest mb-3">Log Yesterday's Win</h2>
            <input type="text" id="reflection-input" oninput="checkInput()" placeholder="Awaiting data..." 
                class="w-full bg-transparent border-b border-white/10 py-2 text-lg text-white focus:outline-none focus:border-sky-500 transition-all">
        </section>

        <div class="grid grid-cols-2 gap-3 mb-10">
            <button onclick="toggleZen('ocean')" id="btn-ocean" class="py-4 glass rounded-2xl text-[10px] uppercase font-bold tracking-widest">Deep Ocean</button>
            <button onclick="toggleZen('storm')" id="btn-storm" class="py-4 glass rounded-2xl text-[10px] uppercase font-bold tracking-widest">Heavy Storm</button>
            <button onclick="toggleZen('rain')" id="btn-rain" class="py-4 glass rounded-2xl text-[10px] uppercase font-bold tracking-widest">Static Rain</button>
            <button onclick="toggleZen('lofi')" id="btn-lofi" class="py-4 glass rounded-2xl text-[10px] uppercase font-bold tracking-widest">Orbiter Lofi</button>
        </div>
    </div>

    <div id="focus-overlay">
        <div class="text-[11px] tracking-[1em] text-sky-500 font-bold mb-8 uppercase">Protocol: Engaged</div>
        <div id="timer" class="text-8xl font-thin text-white mb-20">60:00</div>
        <button onclick="stopFocus()" class="py-4 px-10 glass rounded-full text-[10px] uppercase tracking-[0.4em] text-white/40">Return to Deck</button>
    </div>

    <footer id="footer-ui" class="fixed bottom-0 left-0 right-0 p-8">
        <button id="lock-btn" onclick="startFocus()" class="w-full py-6 rounded-3xl font-black tracking-[0.4em] text-[12px] uppercase opacity-10 pointer-events-none bg-slate-800 transition-all duration-700">
            Initiate Burn
        </button>
    </footer>

    <audio id="audio-ocean" loop src="https://assets.mixkit.co/sfx/preview/mixkit-crashing-waves-1566.mp3"></audio>
    <audio id="audio-storm" loop src="https://assets.mixkit.co/sfx/preview/mixkit-light-rain-with-thunder-1296.mp3"></audio>
    <audio id="audio-rain" loop src="https://assets.mixkit.co/sfx/preview/mixkit-rain-in-the-forest-2415.mp3"></audio>
    <audio id="audio-lofi" loop src="https://assets.mixkit.co/music/preview/mixkit-night-city-744.mp3"></audio>

    <script>
        document.getElementById('date-display').innerText = new Date().toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric'}).toUpperCase();

        const messages = [
            "Precision is the byproduct of focus. Eliminate the noise.",
            "The stars don't compete with each other. They just shine.",
            "Action is the only antidote to uncertainty.",
            "Your trajectory is determined by your habits, not your hopes."
        ];
        document.getElementById('daily-inspiration').innerText = `"${messages[Math.floor(Math.random() * messages.length)]}"`;

        function checkInput() {
            const val = document.getElementById('reflection-input').value.trim();
            const btn = document.getElementById('lock-btn');
            // Prime audio on first type
            if(val.length > 0) { btn.classList.add('btn-active'); } 
            else { btn.classList.remove('btn-active'); }
        }

        let activeAudio = null;
        function toggleZen(type) {
            const target = document.getElementById(`audio-${type}`);
            if (activeAudio === target) {
                target.pause(); activeAudio = null;
                document.getElementById(`btn-${type}`).classList.remove('active-zen');
            } else {
                if (activeAudio) activeAudio.pause();
                document.querySelectorAll('.active-zen').forEach(b => b.classList.remove('active-zen'));
                target.play().catch(() => {}); 
                activeAudio = target;
                document.getElementById(`btn-${type}`).classList.add('active-zen');
            }
        }

        let timerInterval = null;
        function startFocus() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('footer-ui').style.display = 'none';
            document.getElementById('focus-overlay').style.display = 'flex';
            let timeLeft = 3600;
            timerInterval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                if (--timeLeft < 0) stopFocus();
            }, 1000);
        }

        function stopFocus() {
            clearInterval(timerInterval);
            document.getElementById('focus-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('footer-ui').style.display = 'block';
        }
    </script>
</body>
</html>
