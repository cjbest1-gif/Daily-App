<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chris' Orbiter</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/space-shuttle.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #050a15; }
        body { background: var(--bg); transition: background 2s ease; padding-top: env(safe-area-inset-top); -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .active-zen { background: rgba(56, 189, 248, 0.15) !important; border-color: var(--accent) !important; color: white !important; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .btn-active { background-color: var(--accent) !important; color: white !important; opacity: 1 !important; pointer-events: auto !important; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        #focus-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: #000; flex-direction: column; align-items: center; justify-content: center; }
        .timer-glow { text-shadow: 0 0 25px var(--accent); }
    </style>
</head>
<body class="text-slate-400 min-h-screen p-6 font-sans pb-40 select-none">

    <div id="main-ui" class="max-w-md mx-auto">
        <header class="mt-8 mb-10 flex justify-between items-center">
            <h1 class="text-2xl font-black text-white italic tracking-tighter uppercase">Chris' Orbiter</h1>
            <div class="text-[9px] uppercase tracking-[0.4em] text-sky-500/40 font-bold" id="date-display"></div>
        </header>

        <section class="glass rounded-2xl p-6 mb-6 border-l-2 border-l-sky-500">
            <h2 class="text-[9px] font-bold text-white uppercase tracking-widest mb-3">Orbiter Insight</h2>
            <input type="text" id="reflection-input" oninput="checkInput()" placeholder="Initialize systems..." 
                class="w-full bg-transparent border-b border-white/10 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
        </section>

        <section class="glass rounded-2xl p-6 mb-6">
            <h2 class="text-[9px] font-bold text-amber-500 uppercase tracking-widest mb-4 text-center">2026 Intel</h2>
            <div class="space-y-3 text-[11px] leading-relaxed">
                <p><strong>Doha:</strong> Tech-neutral zones established; AI ethics treaty signed by 40 nations.</p>
                <p><strong>Mars:</strong> First automated greenhouse harvest successful on Jezero Crater.</p>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-3 mb-10">
            <button onclick="toggleZen('ocean')" id="btn-ocean" class="py-4 glass rounded-xl text-[10px] uppercase font-bold tracking-widest">Ocean</button>
            <button onclick="toggleZen('storm')" id="btn-storm" class="py-4 glass rounded-xl text-[10px] uppercase font-bold tracking-widest">Storm</button>
            <button onclick="toggleZen('rain')" id="btn-rain" class="py-4 glass rounded-xl text-[10px] uppercase font-bold tracking-widest">Rain</button>
            <button onclick="toggleZen('lofi')" id="btn-lofi" class="py-4 glass rounded-xl text-[10px] uppercase font-bold tracking-widest">Lofi</button>
        </div>
    </div>

    <div id="focus-overlay">
        <div id="protocol-label" class="text-[10px] tracking-[0.5em] text-sky-500 font-bold mb-6 uppercase">Orbiter: Engaged</div>
        <div id="timer" class="text-8xl font-thin text-white timer-glow">60:00</div>
        <button onclick="stopFocus()" class="mt-24 py-3 px-8 glass rounded-full text-[9px] uppercase tracking-[0.3em] hover:text-white transition-all">← Back to Dashboard</button>
    </div>

    <footer id="footer-ui" class="fixed bottom-0 left-0 right-0 p-8">
        <button id="lock-btn" onclick="startFocus()" class="w-full py-5 rounded-2xl font-black tracking-widest text-xs uppercase opacity-20 pointer-events-none bg-slate-800 transition-all">
            Start Orbiter
        </button>
    </footer>

    <audio id="audio-ocean" loop src="https://assets.mixkit.co/sfx/preview/mixkit-crashing-waves-1566.mp3"></audio>
    <audio id="audio-storm" loop src="https://assets.mixkit.co/sfx/preview/mixkit-light-rain-with-thunder-1296.mp3"></audio>
    <audio id="audio-rain" loop src="https://assets.mixkit.co/sfx/preview/mixkit-rain-in-the-forest-2415.mp3"></audio>
    <audio id="audio-lofi" loop src="https://assets.mixkit.co/music/preview/mixkit-night-city-744.mp3"></audio>

    <script>
        document.getElementById('date-display').innerText = new Date().toLocaleDateString(undefined, {weekday: 'long', month: 'short', day: 'numeric'}).toUpperCase();

        function checkInput() {
            const input = document.getElementById('reflection-input').value.trim();
            const btn = document.getElementById('lock-btn');
            // MOBILE AUDIO WAKE-UP: Browsers need a user action to unlock audio
            if(input.length > 0) { 
                btn.classList.add('btn-active'); 
                btn.style.pointerEvents = 'auto'; 
            } else { 
                btn.classList.remove('btn-active'); 
                btn.style.pointerEvents = 'none'; 
            }
        }

        let activeAudio = null;
        function toggleZen(type) {
            const target = document.getElementById(`audio-${type}`);
            if (activeAudio === target) {
                target.pause(); activeAudio = null;
                document.getElementById(`btn-${type}`).classList.remove('active-zen');
            } else {
                if (activeAudio) activeAudio.pause();
                document.querySelectorAll('.active-zen').forEach(b => b.classList.remove('active-zen'));
                target.play(); // This now works because it's triggered by a button tap
                activeAudio = target;
                document.getElementById(`btn-${type}`).classList.add('active-zen');
            }
        }

        let timerInterval = null;
        function startFocus() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('footer-ui').style.display = 'none';
            document.getElementById('focus-overlay').style.display = 'flex';
            let time = 3600;
            timerInterval = setInterval(() => {
                let mins = Math.floor(time / 60), secs = time % 60;
                document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                if (--time < 0) stopFocus();
            }, 1000);
        }

        function stopFocus() {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('footer-ui').style.display = 'block';
            document.getElementById('focus-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
