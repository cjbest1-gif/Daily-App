<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Focus OS</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FocusOS">
    <meta name="theme-color" content="#050a15">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/0a0f1e/38bdf8?text=F">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #050a15; }
        body { 
            background: var(--bg); 
            transition: background 2s ease; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            padding-top: env(safe-area-inset-top);
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transform: translateZ(0);
        }
        .active-zen { 
            background: rgba(56, 189, 248, 0.15) !important; 
            border-color: var(--accent) !important; 
            color: white !important;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }
        .btn-push { 
            box-shadow: 0 4px 0 #0369a1; 
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); 
            background-color: var(--accent); 
        }
        .btn-push:active { transform: translateY(2px); box-shadow: 0 1px 0 #0369a1; }
        .btn-disabled { opacity: 0.15; pointer-events: none; filter: grayscale(1); }
        
        #focus-overlay { 
            display: none; position: fixed; inset: 0; z-index: 100; 
            background: radial-gradient(circle at center, #0a1122 0%, #000 100%); 
            flex-direction: column; align-items: center; justify-content: center; 
            transition: all 5s ease;
        }
        
        .timer-glow { transition: text-shadow 2s ease; }
        .timer-active { text-shadow: 0 0 30px var(--accent); }
    </style>
</head>
<body class="text-slate-400 min-h-screen p-6 font-sans pb-40 select-none">

    <div id="main-ui" class="max-w-md mx-auto">
        <header class="mt-8 mb-10 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">System.v2</h1>
                <p id="date-display" class="text-[9px] uppercase tracking-[0.4em] font-bold text-sky-500/40"></p>
            </div>
            <div class="w-10 h-10 glass rounded-full flex items-center justify-center border-sky-500/10">
                <div class="w-1.5 h-1.5 bg-sky-500 rounded-full animate-pulse"></div>
            </div>
        </header>

        <section class="glass rounded-2xl p-6 mb-6 border-l-2 border-l-sky-500">
            <h2 class="text-[9px] font-bold text-white uppercase tracking-[0.3em] mb-4">Yesterday's Metric</h2>
            <input type="text" id="reflection-input" oninput="checkInput()" autocomplete="off" placeholder="One definitive win..." 
                class="w-full bg-transparent border-b border-white/5 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500/50 transition-all">
        </section>

        <section class="glass rounded-2xl p-6 mb-6">
            <h2 class="text-[9px] font-bold text-amber-500/80 uppercase tracking-[0.3em] mb-4 text-center">Global Briefing</h2>
            <div id="news-container" class="space-y-4 text-[11px] leading-relaxed"></div>
        </section>

        <div class="grid grid-cols-2 gap-3 mb-10">
            <button onclick="toggleZen('ocean')" id="btn-ocean" class="py-4 glass rounded-xl text-[10px] uppercase font-bold tracking-[0.2em]">Ocean</button>
            <button onclick="toggleZen('storm')" id="btn-storm" class="py-4 glass rounded-xl text-[10px] uppercase font-bold tracking-[0.2em]">Storm</button>
        </div>
    </div>

    <div id="focus-overlay">
        <div id="protocol-label" class="text-[10px] tracking-[0.6em] text-sky-500 font-bold mb-6 uppercase">Protocol: Engaged</div>
        <div id="timer" class="text-8xl font-thin text-white tracking-tighter timer-glow">60:00</div>
        <button onclick="abortFocus()" class="mt-20 text-[9px] text-slate-600 uppercase tracking-[0.3em] hover:text-red-400 transition-colors">Terminate Session</button>
    </div>

    <footer id="footer-ui" class="fixed bottom-0 left-0 right-0 p-8">
        <button id="lock-btn" onclick="startFocus()" class="btn-push btn-disabled w-full py-5 text-white rounded-2xl font-black tracking-[0.3em] text-[11px] uppercase shadow-2xl">
            Initialize Focus
        </button>
    </footer>

    <audio id="audio-ocean" loop preload="auto" src="https://www.soundjay.com/nature/ocean-waves-1.mp3"></audio>
    <audio id="audio-storm" loop preload="auto" src="https://www.soundjay.com/nature/thunderstorm-01.mp3"></audio>
