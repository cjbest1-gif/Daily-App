<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Focus OS | Unlocked</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #050a15; }
        body { background: var(--bg); transition: background 2s ease; padding-top: env(safe-area-inset-top); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* The Active Button State */
        .btn-active { 
            background-color: var(--accent) !important; 
            opacity: 1 !important; 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4), 0 4px 0 #0369a1 !important;
            transform: scale(1.02);
        }
        
        .btn-push { 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0.15; 
            background-color: #1e293b;
            pointer-events: none;
        }

        #focus-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: #000; flex-direction: column; align-items: center; justify-content: center; }
        .timer-glow { text-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body class="text-slate-400 min-h-screen p-6 font-sans pb-40">

    <div id="main-ui" class="max-w-md mx-auto">
        <header class="mt-8 mb-10 flex justify-between items-center">
            <h1 class="text-2xl font-black text-white italic">SYSTEM.OS</h1>
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
        </header>

        <section class="glass rounded-2xl p-6 mb-8 border-l-2 border-l-sky-500">
            <h2 class="text-[10px] font-bold text-white uppercase tracking-widest mb-4">Yesterday's Insight</h2>
            <input type="text" id="reflection-input" oninput="forceUnlock()" autocomplete="off" placeholder="Type to unlock..." 
                class="w-full bg-transparent border-b border-white/10 py-3 text-lg text-slate-100 focus:outline-none focus:border-sky-500 transition-all">
        </section>

        <section class="glass rounded-2xl p-6 mb-6 text-[11px] leading-relaxed">
            <p class="text-amber-500 font-bold uppercase mb-2 tracking-tighter">Intel Briefing: 25 MAR</p>
            <p class="border-b border-white/5 pb-2 mb-2"><strong>Doha:</strong> Peace talks show promise; regional markets steady.</p>
            <p><strong>Energy:</strong> Global reserves stabilizing as transit routes reopen.</p>
        </section>
    </div>

    <div id="focus-overlay">
        <div class="text-[10px] tracking-[0.5em] text-sky-500 font-bold mb-6 uppercase">Deep Work Protocol</div>
        <div id="timer" class="text-8xl font-thin text-white timer-glow">60:00</div>
        <button onclick="location.reload()" class="mt-20 opacity-20 text-[10px] uppercase tracking-widest">Abort</button>
    </div>

    <footer id="footer-ui" class="fixed bottom-0 left-0 right-0 p-8">
        <button id="lock-btn" onclick="startFocus()" class="btn-push w-full py-5 text-white rounded-2xl font-black tracking-widest text-xs uppercase">
            Initialize Focus
        </button>
    </footer>

    <script>
        function forceUnlock() {
            const input = document.getElementById('reflection-input').value;
            const btn = document.getElementById('lock-btn');
            
            if(input.length > 0) {
                btn.classList.add('btn-active');
                btn.style.pointerEvents = 'auto';
            } else {
                btn.classList.remove('btn-active');
                btn.style.pointerEvents = 'none';
            }
        }

        function startFocus() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('footer-ui').style.display = 'none';
            document.getElementById('focus-overlay').style.display = 'flex';
            
            let time = 3600;
            setInterval(() => {
                let mins = Math.floor(time / 60), secs = time % 60;
                document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                if (--time < 0) location.reload();
            }, 1000);
        }
    </script>
</body>
</html>
